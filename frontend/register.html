<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - SmartResort</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-box">
        <h1>Create Account</h1>
        <p>Register to book rooms and enjoy resort services.</p>

        <form id="registerForm">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" placeholder="Full Name" required />

          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Email" required />

          <label for="phone">Phone Number</label>
          <input type="text" id="phone" placeholder="09XXXXXXXXX" required />

          <label for="address">Home Address</label>
          <input type="text" id="address" placeholder="Home Address" required />

          <label for="password">Password</label>
          <div class="password-group">
            <input type="password" id="password" placeholder="Password" required />
            <button type="button" class="toggle-password" data-target="password">Show</button>
          </div>

          <label for="confirmPassword">Confirm Password</label>
          <div class="password-group">
            <input
              type="password"
              id="confirmPassword"
              placeholder="Confirm Password"
              required
            />
            <button
              type="button"
              class="toggle-password"
              data-target="confirmPassword"
            >
              Show
            </button>
          </div>

          <button type="submit" class="btn-primary full-btn">Register</button>
        </form>

        <div class="auth-link">
          <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/toast.js"></script>
  <script src="js/password-toggle.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
