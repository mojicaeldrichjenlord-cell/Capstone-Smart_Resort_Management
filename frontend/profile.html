<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile - SmartResort</title>
  <link rel="stylesheet" href="css/style.css" />

  <style>
    .profile-wrapper {
      width: 92%;
      max-width: 1100px;
      margin: 0 auto 40px;
    }

    .profile-card {
      background: #ffffff;
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      margin-bottom: 30px;
    }

    .profile-card h2 {
      margin-bottom: 22px;
      color: #0f172a;
      font-size: 2rem;
    }

    .profile-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 20px;
    }

    .profile-form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .profile-form-group.full-width {
      grid-column: 1 / -1;
    }

    .profile-form-group label {
      font-weight: 700;
      color: #0f172a;
      font-size: 1rem;
    }

    .profile-readonly {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 1rem;
      background: #f8fafc;
      color: #334155;
      min-height: 52px;
      display: flex;
      align-items: center;
      word-break: break-word;
    }

    .password-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .password-group {
      position: relative;
      display: flex;
      align-items: center;
    }

    .password-group input {
      width: 100%;
      padding: 14px 70px 14px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
      background: #fff;
    }

    .password-group input:focus {
      border-color: #14b8a6;
      box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.15);
    }

    .toggle-password {
      position: absolute;
      right: 14px;
      border: none;
      background: transparent;
      color: #14b8a6;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .profile-submit-btn {
      margin-top: 8px;
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 12px;
      background: #14b8a6;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .profile-submit-btn:hover {
      background: #0f766e;
    }

    @media (max-width: 768px) {
      .profile-form-grid {
        grid-template-columns: 1fr;
      }

      .profile-card {
        padding: 22px;
      }

      .profile-card h2 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body class="has-fixed-navbar">
  <header class="navbar">
    <div class="logo">SmartResort</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="rooms.html">Rooms</a>
      <a href="my-bookings.html">My Bookings</a>
      <a href="profile.html">Profile</a>
      <a href="#" id="logoutBtn">Logout</a>
    </nav>
  </header>

  <section class="page-header">
    <h1>My Profile</h1>
    <p>View your account details.</p>
  </section>

  <main class="profile-wrapper">
    <section class="profile-card">
      <h2>Profile Information</h2>

      <div class="profile-form-grid">
        <div class="profile-form-group">
          <label>Full Name</label>
          <div class="profile-readonly" id="profileFullname">Loading...</div>
        </div>

        <div class="profile-form-group">
          <label>Email</label>
          <div class="profile-readonly" id="profileEmail">Loading...</div>
        </div>

        <div class="profile-form-group">
          <label>Phone Number</label>
          <div class="profile-readonly" id="profilePhone">Loading...</div>
        </div>

        <div class="profile-form-group full-width">
          <label>Home Address</label>
          <div class="profile-readonly" id="profileAddress">Loading...</div>
        </div>
      </div>
    </section>

    <section class="profile-card">
      <h2>Change Password</h2>

      <form id="changePasswordForm" class="password-form">
        <div class="profile-form-group">
          <label for="currentPassword">Current Password</label>
          <div class="password-group">
            <input type="password" id="currentPassword" required />
            <button type="button" class="toggle-password" data-target="currentPassword">
              Show
            </button>
          </div>
        </div>

        <div class="profile-form-group">
          <label for="newPassword">New Password</label>
          <div class="password-group">
            <input type="password" id="newPassword" required />
            <button type="button" class="toggle-password" data-target="newPassword">
              Show
            </button>
          </div>
        </div>

        <div class="profile-form-group">
          <label for="confirmNewPassword">Confirm New Password</label>
          <div class="password-group">
            <input type="password" id="confirmNewPassword" required />
            <button type="button" class="toggle-password" data-target="confirmNewPassword">
              Show
            </button>
          </div>
        </div>

        <button type="submit" class="profile-submit-btn">Change Password</button>
      </form>
    </section>
  </main>

  <script src="js/toast.js"></script>
  <script src="js/password-toggle.js"></script>
  <script src="js/active-nav.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
