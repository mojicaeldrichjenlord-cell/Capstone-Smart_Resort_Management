<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rooms - SmartResort</title>
    <link rel="stylesheet" href="css/style.css" />

    <style>
      .site-header {
        position: sticky;
        top: 0;
        z-index: 2000;
        background: #0f172a;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
      }

      .site-header-inner {
        width: 94%;
        max-width: 1300px;
        margin: 0 auto;
        min-height: 72px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .site-logo {
        color: #ffffff;
        font-size: 1.9rem;
        font-weight: 800;
        text-decoration: none;
        line-height: 1;
      }

      .desktop-nav {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .desktop-nav a,
      .mobile-nav a {
        text-decoration: none;
        color: #ffffff;
        font-weight: 700;
        padding: 10px 14px;
        border-radius: 10px;
        transition: 0.2s ease;
        display: inline-block;
      }

      .desktop-nav a:hover,
      .mobile-nav a:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      .desktop-nav a.active,
      .mobile-nav a.active {
        background: #14b8a6;
        color: #ffffff;
      }

      .menu-toggle {
        display: none;
        width: 46px;
        height: 46px;
        border: none;
        border-radius: 10px;
        background: #14b8a6;
        cursor: pointer;
        position: relative;
        flex-shrink: 0;
      }

      .menu-toggle span {
        position: absolute;
        left: 11px;
        width: 24px;
        height: 3px;
        background: white;
        border-radius: 999px;
        transition: 0.25s ease;
      }

      .menu-toggle span:nth-child(1) {
        top: 13px;
      }
      .menu-toggle span:nth-child(2) {
        top: 21px;
      }
      .menu-toggle span:nth-child(3) {
        top: 29px;
      }

      .menu-toggle.active span:nth-child(1) {
        transform: rotate(45deg);
        top: 21px;
      }

      .menu-toggle.active span:nth-child(2) {
        opacity: 0;
      }

      .menu-toggle.active span:nth-child(3) {
        transform: rotate(-45deg);
        top: 21px;
      }

      .mobile-nav {
        display: none;
        width: 94%;
        max-width: 1300px;
        margin: 0 auto 14px;
        background: #1e293b;
        border-radius: 14px;
        padding: 10px;
        flex-direction: column;
        gap: 8px;
      }

      .mobile-nav.show {
        display: flex;
      }

      .mobile-nav a {
        width: 100%;
        text-align: left;
      }

      .page-header {
        background: linear-gradient(135deg, #0f172a, #14b8a6);
        color: white;
        text-align: center;
        padding: 56px 18px;
      }

      .page-header h1 {
        margin: 0 0 10px;
        font-size: 2.7rem;
      }

      .page-header p {
        margin: 0;
        font-size: 1rem;
        opacity: 0.95;
      }

      .rooms-wrapper {
        width: 94%;
        max-width: 1350px;
        margin: 28px auto 34px;
      }

      .rooms-top-actions {
        display: flex;
        justify-content: flex-start;
        margin-bottom: 18px;
      }

      .back-btn {
        display: inline-block;
        text-decoration: none;
        background: #e2e8f0;
        color: #0f172a;
        padding: 10px 16px;
        border-radius: 10px;
        font-weight: 700;
        transition: 0.2s ease;
      }

      .back-btn:hover {
        background: #cbd5e1;
      }

      .room-ai-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 22px;
      }

      .room-ai-card {
        background: white;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        display: flex;
        flex-direction: column;
      }

      .room-ai-card img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        background: #f1f5f9;
      }

      .room-ai-content {
        padding: 18px;
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .room-ai-content h3 {
        margin-bottom: 10px;
        color: #0f172a;
        font-size: 1.25rem;
        line-height: 1.3;
      }

      .room-ai-content p {
        margin-bottom: 8px;
        color: #475569;
        font-size: 0.95rem;
        line-height: 1.5;
      }
      .ai-chat-mic-btn {
        border: none;
        background: #e2e8f0;
        color: #0f172a;
        width: 48px;
        min-width: 48px;
        height: 48px;
        border-radius: 12px;
        font-size: 1.2rem;
        font-weight: 700;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .ai-chat-mic-btn:hover {
        background: #cbd5e1;
      }

      .ai-chat-mic-btn.active-voice-btn {
        background: #14b8a6 !important;
        color: white !important;
      }

      .room-price {
        font-size: 1rem;
        font-weight: 700;
        color: #0f172a;
        margin-bottom: 12px;
      }

      .room-ai-meta {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px 10px;
        margin: 14px 0;
      }

      .room-ai-meta div {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 0.9rem;
        color: #334155;
        word-break: break-word;
        line-height: 1.4;
      }

      .room-ai-amenities {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 10px;
        margin-bottom: 16px;
        color: #334155;
        font-size: 0.92rem;
        word-break: break-word;
        line-height: 1.5;
      }

      .room-ai-actions {
        margin-top: auto;
        padding-top: 10px;
      }

      .book-now-btn {
        display: inline-block;
        text-decoration: none;
        background: #14b8a6;
        color: white;
        padding: 11px 16px;
        border-radius: 10px;
        font-weight: 700;
        transition: 0.2s ease;
      }

      .book-now-btn:hover {
        background: #0f766e;
      }

      .ai-chat-toggle {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 3000;
        border: none;
        border-radius: 999px;
        background: #14b8a6;
        color: white;
        font-weight: 800;
        padding: 14px 18px;
        cursor: pointer;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
      }

      .ai-chat-window {
        position: fixed;
        right: 20px;
        bottom: 82px;
        width: 380px;
        max-width: calc(100vw - 24px);
        background: white;
        border-radius: 18px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
        overflow: hidden;
        z-index: 3000;
        display: none;
      }

      .ai-chat-window.show {
        display: block;
      }

      .ai-chat-window.maximized {
        width: min(820px, calc(100vw - 24px));
        height: min(82vh, 760px);
        bottom: 20px;
      }

      .ai-chat-window.maximized .ai-chat-messages {
        height: calc(min(82vh, 760px) - 168px);
      }

      .ai-chat-header {
        background: #0f172a;
        color: white;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .ai-chat-header h3 {
        margin: 0;
        font-size: 1rem;
        flex: 1;
      }

      .ai-chat-header-actions {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .ai-chat-header-btn {
        border: none;
        background: rgba(255, 255, 255, 0.12);
        color: white;
        font-size: 0.85rem;
        cursor: pointer;
        min-width: 32px;
        height: 32px;
        border-radius: 8px;
        padding: 0 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .active-voice-btn {
        background: #14b8a6 !important;
        color: white !important;
      }

      .ai-chat-messages {
        height: 340px;
        overflow-y: auto;
        padding: 14px;
        background: #f8fafc;
      }

      .ai-message {
        display: flex;
        flex-direction: column;
        margin-bottom: 10px;
      }

      .ai-message.user {
        align-items: flex-end;
      }

      .ai-message.assistant {
        align-items: flex-start;
      }

      .ai-bubble {
        max-width: 88%;
        padding: 10px 12px;
        border-radius: 14px;
        font-size: 0.95rem;
        line-height: 1.6;
        word-break: break-word;
      }

      .ai-message.user .ai-bubble {
        background: #14b8a6;
        color: white;
        border-bottom-right-radius: 6px;
      }

      .ai-message.assistant .ai-bubble {
        background: white;
        color: #0f172a;
        border: 1px solid #e2e8f0;
        border-bottom-left-radius: 6px;
      }

      .ai-chat-input-area {
        display: flex;
        gap: 8px;
        padding: 12px;
        border-top: 1px solid #e2e8f0;
        background: white;
      }

      .ai-chat-input-area input {
        flex: 1;
        padding: 12px 14px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        outline: none;
        font-size: 0.95rem;
      }

      .ai-chat-input-area input:focus {
        border-color: #14b8a6;
        box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.15);
      }

      .ai-chat-send {
        border: none;
        background: #14b8a6;
        color: white;
        padding: 12px 14px;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
      }

      .ai-chat-send:hover {
        background: #0f766e;
      }

      @media (max-width: 900px) {
        .page-header h1 {
          font-size: 2.2rem;
        }
      }

      @media (max-width: 768px) {
        .desktop-nav {
          display: none;
        }

        .menu-toggle {
          display: inline-block;
        }

        .page-header {
          padding: 42px 16px;
        }

        .page-header h1 {
          font-size: 2rem;
        }

        .room-ai-grid {
          grid-template-columns: 1fr;
        }

        .room-ai-meta {
          grid-template-columns: 1fr;
        }

        .rooms-wrapper {
          margin-top: 20px;
        }
      }

      @media (max-width: 480px) {
        .site-header-inner {
          min-height: 66px;
        }

        .site-logo {
          font-size: 1.55rem;
        }

        .page-header h1 {
          font-size: 1.8rem;
        }

        .page-header p {
          font-size: 0.95rem;
        }

        .room-ai-card img {
          height: 190px;
        }

        .room-ai-content {
          padding: 15px;
        }

        .back-btn,
        .book-now-btn {
          width: 100%;
          text-align: center;
        }

        .rooms-top-actions {
          display: block;
        }

        .ai-chat-toggle {
          right: 14px;
          bottom: 14px;
          width: calc(100vw - 28px);
        }

        .ai-chat-window {
          right: 14px;
          left: 14px;
          width: auto;
          bottom: 74px;
          max-width: none;
        }

        .ai-chat-window.maximized {
          left: 10px;
          right: 10px;
          width: auto;
          height: calc(100vh - 90px);
          bottom: 10px;
        }

        .ai-chat-window.maximized .ai-chat-messages {
          height: calc(100vh - 240px);
        }

        .ai-chat-header {
          align-items: flex-start;
        }

        .ai-chat-header-actions {
          gap: 5px;
        }

        .ai-chat-header-btn {
          font-size: 0.75rem;
          padding: 0 8px;
        }

        .ai-chat-messages {
          height: 300px;
        }

        .ai-bubble {
          max-width: 96%;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a href="index.html" class="site-logo">SmartResort</a>

        <nav class="desktop-nav">
          <a href="index.html">Home</a>
          <a href="rooms.html" class="active">Rooms</a>
          <a href="my-bookings.html">My Bookings</a>
          <a href="profile.html">Profile</a>
          <a href="#" id="logoutBtn">Logout</a>
        </nav>

        <button class="menu-toggle" id="menuToggle" aria-label="Open menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>

      <nav class="mobile-nav" id="mobileNav">
        <a href="index.html">Home</a>
        <a href="rooms.html" class="active">Rooms</a>
        <a href="my-bookings.html">My Bookings</a>
        <a href="profile.html">Profile</a>
        <a href="#" id="mobileLogoutBtn">Logout</a>
      </nav>
    </header>

    <section class="page-header">
      <h1>Our Rooms</h1>
      <p>Choose the best room for your stay.</p>
    </section>

    <main class="rooms-wrapper">
      <div class="rooms-top-actions">
        <a href="index.html" class="back-btn">← Back to Home</a>
      </div>

      <div class="room-ai-grid" id="roomsContainer"></div>
    </main>

    <button id="aiChatToggle" class="ai-chat-toggle">Ask AI Assistant</button>

    <div id="aiChatWindow" class="ai-chat-window">
      <div class="ai-chat-header">
        <h3>SmartResort AI Assistant</h3>

        <div class="ai-chat-header-actions">
          <button
            id="aiChatMaximize"
            class="ai-chat-header-btn"
            title="Maximize"
          >
            ▢
          </button>
          <button id="aiChatClose" class="ai-chat-header-btn" title="Close">
            &times;
          </button>
        </div>
      </div>

      <div id="aiChatMessages" class="ai-chat-messages"></div>

      <div class="ai-chat-input-area">
        <input
          type="text"
          id="aiChatInput"
          placeholder="Ask about room recommendations, dates, or payment..."
        />
        <button
          id="aiMicBtn"
          class="ai-chat-mic-btn"
          title="Voice input"
          aria-label="Voice input"
        >
          🎤
        </button>
        <button id="aiSendBtn" class="ai-chat-send">Send</button>
      </div>
    </div>

    <script src="js/toast.js"></script>
    <script src="js/mobile-nav.js"></script>
    <script src="js/rooms.js"></script>
    <script src="js/ai-chat.js"></script>
  </body>
</html>
