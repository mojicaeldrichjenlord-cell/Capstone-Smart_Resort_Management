<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Receipt - SmartResort</title>
  <link rel="stylesheet" href="css/style.css" />

  <style>
    .site-header {
      position: sticky;
      top: 0;
      z-index: 2000;
      background: #0f172a;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
    }

    .site-header-inner {
      width: 94%;
      max-width: 1300px;
      margin: 0 auto;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .site-logo {
      color: #ffffff;
      font-size: 1.9rem;
      font-weight: 800;
      text-decoration: none;
      line-height: 1;
    }

    .desktop-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .desktop-nav a,
    .mobile-nav a {
      text-decoration: none;
      color: #ffffff;
      font-weight: 700;
      padding: 10px 14px;
      border-radius: 10px;
      transition: 0.2s ease;
      display: inline-block;
    }

    .desktop-nav a:hover,
    .mobile-nav a:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .desktop-nav a.active,
    .mobile-nav a.active {
      background: #14b8a6;
      color: #ffffff;
    }

    .menu-toggle {
      display: none;
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 10px;
      background: #14b8a6;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
    }

    .menu-toggle span {
      position: absolute;
      left: 11px;
      width: 24px;
      height: 3px;
      background: white;
      border-radius: 999px;
      transition: 0.25s ease;
    }

    .menu-toggle span:nth-child(1) { top: 13px; }
    .menu-toggle span:nth-child(2) { top: 21px; }
    .menu-toggle span:nth-child(3) { top: 29px; }

    .menu-toggle.active span:nth-child(1) {
      transform: rotate(45deg);
      top: 21px;
    }

    .menu-toggle.active span:nth-child(2) {
      opacity: 0;
    }

    .menu-toggle.active span:nth-child(3) {
      transform: rotate(-45deg);
      top: 21px;
    }

    .mobile-nav {
      display: none;
      width: 94%;
      max-width: 1300px;
      margin: 0 auto 14px;
      background: #1e293b;
      border-radius: 14px;
      padding: 10px;
      flex-direction: column;
      gap: 8px;
    }

    .mobile-nav.show {
      display: flex;
    }

    .mobile-nav a {
      width: 100%;
      text-align: left;
    }

    .page-header {
      background: linear-gradient(135deg, #0f172a, #14b8a6);
      color: white;
      text-align: center;
      padding: 56px 18px;
    }

    .page-header h1 {
      margin: 0 0 10px;
      font-size: 2.5rem;
    }

    .page-header p {
      margin: 0;
      font-size: 1rem;
      opacity: 0.95;
      line-height: 1.6;
    }

    .receipt-page-wrapper {
      width: 92%;
      max-width: 950px;
      margin: 28px auto 40px;
    }

    .receipt-top-actions {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 16px;
    }

    .back-btn {
      display: inline-block;
      text-decoration: none;
      background: #e2e8f0;
      color: #0f172a;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .back-btn:hover {
      background: #cbd5e1;
    }

    .receipt-box {
      background: #ffffff;
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      max-width: 760px;
      margin: 0 auto;
    }

    .receipt-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 22px;
      padding-bottom: 18px;
      border-bottom: 1px solid #e2e8f0;
    }

    .receipt-brand {
      margin-bottom: 8px;
      font-size: 1rem;
      font-weight: 800;
      color: #14b8a6;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .receipt-top h2 {
      margin: 0;
      font-size: 2rem;
      color: #0f172a;
      line-height: 1.2;
      word-break: break-word;
    }

    .receipt-status {
      padding: 8px 14px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.92rem;
      white-space: nowrap;
    }

    .status-pending {
      background: #fef3c7;
      color: #92400e;
    }

    .status-approved {
      background: #dcfce7;
      color: #166534;
    }

    .status-rejected {
      background: #fee2e2;
      color: #991b1b;
    }

    .status-cancelled {
      background: #e5e7eb;
      color: #374151;
    }

    .status-completed {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .payment-pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.85rem;
    }

    .payment-unpaid {
      background: #fee2e2;
      color: #991b1b;
    }

    .payment-pending {
      background: #fef3c7;
      color: #92400e;
    }

    .payment-paid {
      background: #dcfce7;
      color: #166534;
    }

    .payment-refunded {
      background: #ede9fe;
      color: #6d28d9;
    }

    .receipt-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 18px;
      margin-bottom: 8px;
    }

    .receipt-item {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px 16px;
      min-width: 0;
    }

    .receipt-item.full-width {
      grid-column: 1 / -1;
    }

    .receipt-item label {
      display: block;
      font-size: 0.88rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .receipt-item .value {
      color: #334155;
      font-size: 1rem;
      word-break: break-word;
      line-height: 1.5;
    }

    .receipt-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .receipt-loading,
    .receipt-error {
      text-align: center;
      padding: 30px 20px;
      font-size: 1rem;
      color: #475569;
      line-height: 1.6;
      word-break: break-word;
    }

    .print-header {
      display: none;
    }

    @media (max-width: 768px) {
      .desktop-nav {
        display: none;
      }

      .menu-toggle {
        display: inline-block;
      }

      .page-header {
        padding: 42px 16px;
      }

      .page-header h1 {
        font-size: 2rem;
      }

      .page-header p {
        font-size: 0.98rem;
      }

      .receipt-page-wrapper {
        width: 94%;
        margin: 20px auto 32px;
      }

      .receipt-box {
        padding: 22px;
      }

      .receipt-grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .receipt-top h2 {
        font-size: 1.6rem;
      }
    }

    @media (max-width: 480px) {
      .site-header {
        box-shadow: none;
      }

      .site-header-inner {
        min-height: 62px;
        width: 92%;
      }

      .site-logo {
        font-size: 1.45rem;
      }

      .mobile-nav {
        width: 92%;
        margin-top: 0;
        margin-bottom: 8px;
        padding: 8px;
        border-radius: 12px;
      }

      .mobile-nav a {
        font-size: 0.95rem;
        padding: 10px 12px;
      }

      .page-header {
        padding: 34px 14px;
      }

      .page-header h1 {
        font-size: 1.8rem;
      }

      .page-header p {
        font-size: 0.95rem;
      }

      .receipt-page-wrapper {
        width: 95%;
        margin: 16px auto 26px;
      }

      .receipt-top-actions {
        display: block;
        margin-bottom: 14px;
      }

      .back-btn {
        width: 100%;
        text-align: center;
      }

      .receipt-box {
        padding: 16px;
        border-radius: 16px;
      }

      .receipt-top {
        gap: 12px;
        margin-bottom: 16px;
        padding-bottom: 14px;
      }

      .receipt-brand {
        font-size: 0.88rem;
      }

      .receipt-top h2 {
        font-size: 1.35rem;
      }

      .receipt-status {
        font-size: 0.82rem;
        padding: 7px 12px;
      }

      .receipt-item {
        padding: 12px 13px;
      }

      .receipt-item label {
        font-size: 0.8rem;
        margin-bottom: 6px;
      }

      .receipt-item .value {
        font-size: 0.95rem;
      }

      .receipt-actions .btn-primary,
      .receipt-actions .btn-secondary {
        width: 100%;
        text-align: center;
      }
    }

    @media (max-width: 360px) {
      .site-logo {
        font-size: 1.3rem;
      }

      .page-header h1 {
        font-size: 1.6rem;
      }

      .page-header p {
        font-size: 0.92rem;
      }

      .receipt-box {
        padding: 14px;
      }

      .receipt-top h2 {
        font-size: 1.2rem;
      }
    }

    @media print {
      @page {
        size: A4 portrait;
        margin: 12mm;
      }

      body {
        background: white !important;
      }

      .site-header,
      .page-header,
      .receipt-top-actions,
      .receipt-actions,
      .menu-toggle,
      .mobile-nav {
        display: none !important;
      }

      .receipt-page-wrapper {
        width: 100%;
        max-width: 100%;
        margin: 0;
        padding: 0;
      }

      .admin-section {
        margin: 0 !important;
        padding: 0 !important;
        background: white !important;
        box-shadow: none !important;
      }

      .receipt-box {
        max-width: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        box-shadow: none !important;
        border-radius: 0;
        background: white !important;
      }

      .print-header {
        display: block !important;
        text-align: center;
        margin-bottom: 16px;
        border-bottom: 2px solid #111827;
        padding-bottom: 10px;
      }

      .print-header h1 {
        margin: 0 0 6px;
        font-size: 22px;
        color: #111827;
      }

      .print-header p {
        margin: 0;
        font-size: 12px;
        color: #475569;
      }

      .receipt-top {
        margin-bottom: 14px;
        padding-bottom: 10px;
        border-bottom: 1px solid #cbd5e1;
      }

      .receipt-brand {
        font-size: 12px;
        color: #111827 !important;
      }

      .receipt-top h2 {
        font-size: 22px;
        color: #111827 !important;
      }

      .receipt-status,
      .payment-pill {
        border: 1px solid #94a3b8;
        background: white !important;
        color: #111827 !important;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }

      .receipt-grid {
        grid-template-columns: 1fr 1fr;
        gap: 10px 10px;
      }

      .receipt-item {
        border: 1px solid #cbd5e1;
        background: white !important;
        border-radius: 8px;
        padding: 10px 12px;
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .receipt-item label {
        font-size: 10px;
        margin-bottom: 4px;
        color: #111827 !important;
      }

      .receipt-item .value {
        font-size: 12px;
        line-height: 1.35;
        color: #111827 !important;
      }

      .receipt-loading,
      .receipt-error {
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="index.html" class="site-logo">SmartResort</a>

      <nav class="desktop-nav">
        <a href="index.html">Home</a>
        <a href="rooms.html">Rooms</a>
        <a href="my-bookings.html" class="active">My Bookings</a>
        <a href="profile.html">Profile</a>
        <a href="#" id="logoutBtn">Logout</a>
      </nav>

      <button class="menu-toggle" id="menuToggle" aria-label="Open menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <nav class="mobile-nav" id="mobileNav">
      <a href="index.html">Home</a>
      <a href="rooms.html">Rooms</a>
      <a href="my-bookings.html" class="active">My Bookings</a>
      <a href="profile.html">Profile</a>
      <a href="#" id="mobileLogoutBtn">Logout</a>
    </nav>
  </header>

  <section class="page-header">
    <h1>Booking Receipt</h1>
    <p>Your reservation details are shown below.</p>
  </section>

  <main class="receipt-page-wrapper">
    <div class="receipt-top-actions">
      <a href="my-bookings.html" class="back-btn">← Back to My Bookings</a>
    </div>

    <section class="admin-section">
      <div class="receipt-box" id="receiptBox">
        <div class="receipt-loading">Loading receipt...</div>
      </div>

      <div class="receipt-actions">
        <button class="btn-primary" onclick="window.print()">Print Receipt</button>
        <a href="my-bookings.html" class="btn-secondary">Back to My Bookings</a>
      </div>
    </section>
  </main>

  <script src="js/toast.js"></script>
  <script src="js/mobile-nav.js"></script>
  <script src="js/booking-receipt.js"></script>
</body>
</html>
